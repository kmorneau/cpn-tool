<script>
// Tool factory — provides sandboxed scope for testing
function createToolScope(injectedS, mockDocument, mockStorage) {
  const document = mockDocument;
  const localStorage = mockStorage;
  const performance = { now: () => Date.now() };
  const URL = { createObjectURL: () => '#', revokeObjectURL: () => {} };
  class Blob { constructor(p, o) { this.parts = p; } }
  class XMLSerializer { serializeToString(el) { return '<svg/>'; } }
  class Image { set src(v) { setTimeout(() => this.onload?.(), 0); } }

'use strict';
// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const PLACE_R = 46, TW = 90, TH = 40, GRID = 24;
const SVG_NS = 'http://www.w3.org/2000/svg';

// ═══════════════════════════════════════════════════════════
// APPLICATION STATE
// ═══════════════════════════════════════════════════════════
const S = {
  places: [], transitions: [], arcs: [], colorsets: {},
  selected: null,
  tool: 'select',
  mode: 'visual',
  snap: true,
  // Canvas transform
  tx: 0, ty: 0, scale: 1,
  // Arc drawing
  arcSrc: null,
  // Simulation
  simStep: 0, playing: false, playTimer: null,
  // Undo/redo
  history: [], histIdx: -1,
  // Counters
  nc: 0, ac: 0,
  // Analysis
  stateSpace: null,
  // Log
  log: [],
  // Context menu target
  ctxTarget: null,
};

// ═══════════════════════════════════════════════════════════
// EXAMPLES
// ═══════════════════════════════════════════════════════════
const EXAMPLES = {
producer:`// Producer-Consumer CPN
colorset JOBS = {job1, job2, job3}
colorset WORKERS = {w1, w2}

place Ready    : JOBS    = {job1, job2, job3}
place Idle     : WORKERS = {w1, w2}
place Busy     : JOBS*WORKERS = {}
place Done     : JOBS    = {}

transition Assign   [guard: j in JOBS, w in WORKERS]
transition Complete [guard: true]

arc Ready    --> Assign   : j
arc Idle     --> Assign   : w
arc Assign   --> Busy     : (j,w)
arc Busy     --> Complete : (j,w)
arc Complete --> Done     : j
arc Complete --> Idle     : w`,

philosophers:`// Dining Philosophers
colorset PHIL = {p1, p2}
colorset FORK = {f1, f2}

place Thinking : PHIL      = {p1, p2}
place Eating   : PHIL*FORK = {}
place Forks    : FORK      = {f1, f2}

transition PickUp  [guard: p in PHIL, f in FORK]
transition PutDown [guard: true]

arc Thinking --> PickUp  : p
arc Forks    --> PickUp  : f
arc PickUp   --> Eating  : (p,f)
arc Eating   --> PutDown : (p,f)
arc PutDown  --> Thinking: p
arc PutDown  --> Forks   : f`,

pipeline:`// Token Pipeline
colorset DATA = {a, b, c}

place Input   : DATA = {a, b, c}
place Buffer  : DATA = {}
place Output  : DATA = {}

transition Push [guard: true]
transition Pop  [guard: true]

arc Input  --> Push   : x
arc Push   --> Buffer : x
arc Buffer --> Pop    : x
arc Pop    --> Output : x`,

mutex:`// Mutual Exclusion
colorset PROC = {p1, p2}
colorset SEM  = {s}

place Ready     : PROC = {p1, p2}
place Critical  : PROC = {}
place Done      : PROC = {}
place Semaphore : SEM  = {s}

transition Enter [guard: p in PROC]
transition Exit  [guard: true]

arc Ready     --> Enter     : p
arc Semaphore --> Enter     : s
arc Enter     --> Critical  : p
arc Critical  --> Exit      : p
arc Exit      --> Done      : p
arc Exit      --> Semaphore : s`,
};

// ═══════════════════════════════════════════════════════════
// UNDO / REDO — Command Pattern
// ═══════════════════════════════════════════════════════════
function execCmd(cmd) {
  cmd.do();
  S.history.splice(S.histIdx + 1);
  S.history.push(cmd);
  S.histIdx = S.history.length - 1;
  render();
}
function undo() {
  if (S.histIdx < 0) return;
  S.history[S.histIdx].undo();
  S.histIdx--;
  render();
}
function redo() {
  if (S.histIdx >= S.history.length - 1) return;
  S.histIdx++;
  S.history[S.histIdx].do();
  render();
}

const Cmd = {
  addPlace(x, y) {
    const id = 'P' + (++S.nc);
    const node = { id, x, y, label: id, colorSet: 'TOKEN', initTokens: [], tokens: [] };
    return {
      do()   { S.places.push(node); S.selected = { type:'place', id }; },
      undo() { S.places = S.places.filter(p => p.id !== id); S.arcs = S.arcs.filter(a => a.src !== id && a.tgt !== id); if (S.selected?.id === id) S.selected = null; },
    };
  },
  addTransition(x, y) {
    const id = 'T' + (++S.nc);
    const node = { id, x, y, label: id, guard: 'true' };
    return {
      do()   { S.transitions.push(node); S.selected = { type:'transition', id }; },
      undo() { S.transitions = S.transitions.filter(t => t.id !== id); S.arcs = S.arcs.filter(a => a.src !== id && a.tgt !== id); if (S.selected?.id === id) S.selected = null; },
    };
  },
  addArc(srcId, tgtId, expr) {
    const arc = { id: 'arc' + (++S.ac), src: srcId, tgt: tgtId, expr: expr || 'x' };
    return {
      do()   { S.arcs.push(arc); },
      undo() { S.arcs = S.arcs.filter(a => a.id !== arc.id); },
    };
  },
  deleteNode(type, id) {
    const node = findNode(id);
    const removedArcs = S.arcs.filter(a => a.src === id || a.tgt === id);
    return {
      do() {
        if (type === 'place') S.places = S.places.filter(p => p.id !== id);
        else S.transitions = S.transitions.filter(t => t.id !== id);
        S.arcs = S.arcs.filter(a => a.src !== id && a.tgt !== id);
        if (S.selected?.id === id) S.selected = null;
      },
      undo() {
        if (type === 'place') S.places.push(node);
        else S.transitions.push(node);
        removedArcs.forEach(a => S.arcs.push(a));
      },
    };
  },
  moveNode(id, fromX, fromY, toX, toY) {
    const node = findNode(id);
    return {
      do()   { node.x = toX; node.y = toY; },
      undo() { node.x = fromX; node.y = fromY; },
    };
  },
  editProp(id, field, oldVal, newVal) {
    const node = findNode(id);
    return {
      do()   { node[field] = newVal; if (field === 'initTokens') node.tokens = [...newVal]; },
      undo() { node[field] = oldVal; if (field === 'initTokens') node.tokens = [...oldVal]; },
    };
  },
};

// ═══════════════════════════════════════════════════════════
// PARSER
// ═══════════════════════════════════════════════════════════
function parseCPN(src) {
  const cs = {}, places = [], transitions = [], arcs = [], errors = [];
  src.split('\n').forEach((raw, i) => {
    const line = raw.trim();
    if (!line || line.startsWith('//') || line.startsWith('#')) return;
    let m;
    if ((m = line.match(/^colorset\s+(\w+)\s*=\s*\{([^}]*)\}/))) {
      cs[m[1]] = m[2].split(',').map(s=>s.trim()).filter(Boolean); return;
    }
    if ((m = line.match(/^place\s+(\w+)\s*:\s*([\w*×]+)\s*=\s*\{([^}]*)\}/))) {
      // Split on commas that are NOT inside parentheses (handles tuple tokens)
      const toks = (function(str){
        const out=[]; let cur='', depth=0;
        for(const ch of str){ if(ch==='(')depth++; else if(ch===')')depth--; if(ch===','&&depth===0){const t=cur.trim();if(t)out.push(t);cur='';}else cur+=ch; }
        const t=cur.trim(); if(t)out.push(t); return out;
      })(m[3]);
      places.push({ id:m[1], label:m[1], colorSet:m[2], initTokens:[...toks], tokens:[...toks] }); return;
    }
    if ((m = line.match(/^transition\s+(\w+)(?:\s*\[guard:\s*([^\]]*)\])?/))) {
      transitions.push({ id:m[1], label:m[1], guard:m[2]?m[2].trim():'true' }); return;
    }
    if ((m = line.match(/^arc\s+(\w+)\s*-->\s*(\w+)\s*:\s*(.+)/))) {
      arcs.push({ src:m[1], tgt:m[2], expr:m[3].trim() }); return;
    }
    errors.push(`Line ${i+1}: "${line.slice(0,40)}"`);
  });
  return { cs, places, transitions, arcs, errors };
}

// ═══════════════════════════════════════════════════════════
// SERIALIZERS
// ═══════════════════════════════════════════════════════════
function serializeCPN() {
  const lines = ['// CPN Tool — Professional Edition'];
  if (Object.keys(S.colorsets).length) {
    lines.push('');
    for (const [n,v] of Object.entries(S.colorsets))
      lines.push(`colorset ${n} = {${v.join(', ')}}`);
  }
  if (S.places.length) {
    lines.push('');
    S.places.forEach(p => lines.push(`place ${p.label} : ${p.colorSet||'TOKEN'} = {${p.initTokens.join(', ')}}`));
  }
  if (S.transitions.length) {
    lines.push('');
    S.transitions.forEach(t => {
      const g = (t.guard && t.guard!=='true') ? ` [guard: ${t.guard}]` : '';
      lines.push(`transition ${t.label}${g}`);
    });
  }
  if (S.arcs.length) {
    lines.push('');
    S.arcs.forEach(a => {
      const sn = findNode(a.src), tn = findNode(a.tgt);
      if (sn && tn) lines.push(`arc ${sn.label} --> ${tn.label} : ${a.expr}`);
    });
  }
  return lines.join('\n');
}

function serializePNML() {
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  let x = `<?xml version="1.0" encoding="UTF-8"?>\n<pnml xmlns="http://www.pnml.org/version-2009/grammar/pnml">\n<net id="net0" type="http://www.pnml.org/version-2009/grammar/ptnet">\n<name><text>CPN Model</text></name>\n<page id="page0">\n`;
  S.places.forEach(p => {
    x += `<place id="${esc(p.id)}"><name><text>${esc(p.label)}</text></name>`;
    x += `<graphics><position x="${Math.round(p.x)}" y="${Math.round(p.y)}"/></graphics>`;
    if (p.initTokens.length) x += `<initialMarking><text>${esc(p.initTokens.join(','))}</text></initialMarking>`;
    x += `<toolspecific tool="cpntool" version="1.0"><colorset>${esc(p.colorSet||'TOKEN')}</colorset></toolspecific>`;
    x += `</place>\n`;
  });
  S.transitions.forEach(t => {
    x += `<transition id="${esc(t.id)}"><name><text>${esc(t.label)}</text></name>`;
    x += `<graphics><position x="${Math.round(t.x)}" y="${Math.round(t.y)}"/></graphics>`;
    if (t.guard && t.guard!=='true') x += `<condition><text>${esc(t.guard)}</text></condition>`;
    x += `</transition>\n`;
  });
  S.arcs.forEach((a,i) => {
    x += `<arc id="arc${i}" source="${esc(a.src)}" target="${esc(a.tgt)}">`;
    x += `<inscription><text>${esc(a.expr)}</text></inscription></arc>\n`;
  });
  x += `</page></net></pnml>`;
  return x;
}

// ═══════════════════════════════════════════════════════════
// AUTO LAYOUT
// ═══════════════════════════════════════════════════════════
function autoLayout() {
  const W = document.getElementById('canvas-wrap').clientWidth || 800;
  const H = document.getElementById('canvas-wrap').clientHeight || 500;
  const all = [
    ...S.places.map(p=>({...p,k:'place'})),
    ...S.transitions.map(t=>({...t,k:'transition'})),
  ];
  if (!all.length) return;
  const ind = {}; all.forEach(n=>(ind[n.id]=0));
  S.arcs.forEach(a=>{ if(ind[a.tgt]!==undefined) ind[a.tgt]++; });
  const layers = {}, vis = new Set();
  const roots = all.filter(n=>ind[n.id]===0).map(n=>n.id);
  roots.forEach(id=>{layers[id]=0; vis.add(id);});
  const q = [...roots];
  while(q.length){
    const cur = q.shift();
    S.arcs.filter(a=>a.src===cur).forEach(a=>{
      if(!vis.has(a.tgt)){vis.add(a.tgt);layers[a.tgt]=(layers[cur]||0)+1;q.push(a.tgt);}
    });
  }
  all.forEach(n=>{if(layers[n.id]===undefined)layers[n.id]=0;});
  const byL = {};
  all.forEach(n=>{ const l=layers[n.id]; (byL[l]=byL[l]||[]).push(n); });
  const maxL = Math.max(...Object.keys(byL).map(Number), 0);
  const PAD = 100, colW = (W-PAD*2)/Math.max(maxL,1);
  Object.entries(byL).forEach(([l,nodes])=>{
    const x = PAD + colW*Number(l);
    const rowH = (H-PAD*2)/nodes.length;
    nodes.forEach((n,i)=>{
      const node = findNode(n.id);
      if(node){ node.x = snapGrid(x); node.y = snapGrid(PAD+rowH*i+rowH/2); }
    });
  });
}

// ═══════════════════════════════════════════════════════════
// STATE SPACE ENGINE
// ═══════════════════════════════════════════════════════════
class StateSpace {
  constructor() {
    this.nodes = new Map();
    this.nodeList = [];
    this.edges = [];
    this.truncated = false;
  }
  markingKey(m) {
    return JSON.stringify(Object.fromEntries(
      Object.entries(m).sort(([a],[b])=>a.localeCompare(b)).map(([k,v])=>[k,[...v].sort()])
    ));
  }
  cloneM(m) { const r={}; for(const[k,v]of Object.entries(m))r[k]=[...v]; return r; }

  _tryBind(inArcs, idx, binding, marking) {
    if (idx === inArcs.length) return binding;
    const arc = inArcs[idx];
    const tokens = marking[arc.src] || [];
    const expr = arc.expr.trim();
    if (/^\w+$/.test(expr)) {
      for (const tok of tokens) {
        const nb = {...binding, [expr]:tok};
        const res = this._tryBind(inArcs, idx+1, nb, marking);
        if (res!==null) return res;
      }
      return null;
    }
    const tm = expr.match(/^\((\w+),(\w+)\)$/);
    if (tm) {
      for (const tok of tokens) {
        const parts = tok.replace(/[()]/g,'').split(',').map(s=>s.trim());
        if (parts.length===2) {
          const nb = {...binding,[tm[1]]:parts[0],[tm[2]]:parts[1]};
          const res = this._tryBind(inArcs,idx+1,nb,marking);
          if(res!==null)return res;
        }
      }
      return null;
    }
    if (tokens.includes(expr)) return this._tryBind(inArcs,idx+1,binding,marking);
    return null;
  }
  _resolve(expr, binding) {
    const t=expr.trim();
    if(binding[t]!==undefined)return binding[t];
    const tm=t.match(/^\((\w+),(\w+)\)$/);
    if(tm)return `(${binding[tm[1]]||tm[1]},${binding[tm[2]]||tm[2]})`;
    return t;
  }
  getEnabled(marking) {
    const res=[];
    for(const t of S.transitions){
      const inArcs=S.arcs.filter(a=>a.tgt===t.id);
      if(!inArcs.length)continue;
      const b=this._tryBind(inArcs,0,{},marking);
      if(b!==null)res.push({t,binding:b});
    }
    return res;
  }
  fire(marking, item) {
    const m=this.cloneM(marking);
    S.arcs.filter(a=>a.tgt===item.t.id).forEach(arc=>{
      const tok=this._resolve(arc.expr,item.binding);
      const i=m[arc.src].indexOf(tok);
      if(i!==-1)m[arc.src].splice(i,1);
    });
    S.arcs.filter(a=>a.src===item.t.id).forEach(arc=>{
      const tok=this._resolve(arc.expr,item.binding);
      if(m[arc.tgt]!==undefined)m[arc.tgt].push(tok);
    });
    return m;
  }
  explore(initMarking, maxStates=1000) {
    const t0=Date.now();
    const init=this.cloneM(initMarking);
    const initKey=this.markingKey(init);
    const initNode={id:0,key:initKey,marking:init,isDeadlock:false};
    this.nodes.set(initKey,initNode);
    this.nodeList.push(initNode);
    const queue=[initNode]; let nid=1;
    while(queue.length){
      if(this.nodeList.length>=maxStates){this.truncated=true;break;}
      const node=queue.shift();
      const enabled=this.getEnabled(node.marking);
      if(!enabled.length){node.isDeadlock=true;continue;}
      for(const item of enabled){
        const nm=this.fire(node.marking,item);
        const key=this.markingKey(nm);
        let tgt=this.nodes.get(key);
        if(!tgt){tgt={id:nid++,key,marking:nm,isDeadlock:false};this.nodes.set(key,tgt);this.nodeList.push(tgt);queue.push(tgt);}
        const bstr=Object.entries(item.binding).map(([k,v])=>`${k}=${v}`).join(',');
        this.edges.push({from:node.id,to:tgt.id,transId:item.t.id,transLabel:item.t.label,binding:bstr});
      }
    }
    return {nodeCount:this.nodeList.length,edgeCount:this.edges.length,
            deadlocks:this.nodeList.filter(n=>n.isDeadlock),
            truncated:this.truncated,timeMs:Date.now()-t0};
  }
  boundedness() {
    const max={};S.places.forEach(p=>{max[p.id]=0;});
    for(const node of this.nodeList)
      for(const[pid,toks]of Object.entries(node.marking))
        if(toks.length>(max[pid]||0))max[pid]=toks.length;
    return max;
  }
  liveness() {
    const fires=new Set(this.edges.map(e=>e.transId));
    const r={};S.transitions.forEach(t=>{r[t.id]=fires.has(t.id);});
    return r;
  }
  isReachable(targetM) {
    const key=this.markingKey(targetM);
    if(!this.nodes.has(key))return{reachable:false,path:null};
    const initKey=this.nodeList[0]?.key;
    if(!initKey||initKey===key)return{reachable:true,path:[]};
    const visited=new Map([[initKey,null]]);
    const q=[initKey];
    while(q.length){
      const cur=q.shift();
      if(cur===key){
        const path=[];let k=cur;
        while(visited.get(k)!==null){const e=visited.get(k);path.unshift(e);k=this.nodeList[e.from].key;}
        return{reachable:true,path};
      }
      const cNode=this.nodes.get(cur);
      this.edges.filter(e=>e.from===cNode.id).forEach(e=>{
        const nk=this.nodeList[e.to]?.key;
        if(nk&&!visited.has(nk)){visited.set(nk,e);q.push(nk);}
      });
    }
    return{reachable:false,path:null};
  }
  sccCount() {
    const n=this.nodeList.length;
    const adj=Array.from({length:n},()=>[]);
    this.edges.forEach(e=>adj[e.from].push(e.to));
    let idx=0,count=0;
    const indices=new Array(n).fill(-1),low=new Array(n).fill(0),onStk=new Array(n).fill(false),stk=[];
    const sc=(v)=>{
      indices[v]=low[v]=idx++;stk.push(v);onStk[v]=true;
      for(const w of(adj[v]||[])){
        if(indices[w]===-1){sc(w);low[v]=Math.min(low[v],low[w]);}
        else if(onStk[w])low[v]=Math.min(low[v],indices[w]);
      }
      if(low[v]===indices[v]){let w;do{w=stk.pop();onStk[w]=false;}while(w!==v);count++;}
    };
    for(let v=0;v<n;v++)if(indices[v]===-1)sc(v);
    return count;
  }
}

// ═══════════════════════════════════════════════════════════
// SIMULATION ENGINE
// ═══════════════════════════════════════════════════════════
function getEnabled() {
  const ss=new StateSpace();
  const m={};S.places.forEach(p=>{m[p.id]=[...p.tokens];});
  return ss.getEnabled(m);
}
function fireItem(item) {
  const {t,binding}=item;
  S.arcs.filter(a=>a.tgt===t.id).forEach(arc=>{
    const place=S.places.find(p=>p.id===arc.src);
    const tok=resolveExpr(arc.expr,binding);
    const i=place.tokens.indexOf(tok);
    if(i!==-1)place.tokens.splice(i,1);
  });
  S.arcs.filter(a=>a.src===t.id).forEach(arc=>{
    const place=S.places.find(p=>p.id===arc.tgt);
    if(place)place.tokens.push(resolveExpr(arc.expr,binding));
  });
  S.simStep++;
  const bs=Object.entries(binding).map(([k,v])=>`${k}↦${v}`).join(' ');
  log(`Fired: ${t.label}${bs?' ['+bs+']':''}`, 'fire');
  render();
}
function resolveExpr(expr,binding) {
  const t=expr.trim();
  if(binding[t]!==undefined)return binding[t];
  const tm=t.match(/^\((\w+),(\w+)\)$/);
  if(tm)return`(${binding[tm[1]]||tm[1]},${binding[tm[2]]||tm[2]})`;
  return t;
}
function simStep() {
  const en=getEnabled();
  if(!en.length){stopPlay();document.getElementById('deadlock-badge').style.display='block';log('Deadlock — no enabled transitions','warn');return;}
  document.getElementById('deadlock-badge').style.display='none';
  const item=en[Math.floor(Math.random()*en.length)];
  // Flash
  const tEl=document.querySelector(`[data-id="${item.t.id}"] .trans-body`);
  if(tEl){tEl.classList.add('fir');setTimeout(()=>tEl.classList.remove('fir'),260);}
  setTimeout(()=>fireItem(item),120);
}
function simReset() {
  stopPlay();S.simStep=0;
  S.places.forEach(p=>{p.tokens=[...p.initTokens];});
  document.getElementById('deadlock-badge').style.display='none';
  log('Simulation reset','system');render();
}
function startPlay(){S.playing=true;document.getElementById('btn-play').textContent='⏸ Pause';S.playTimer=setInterval(()=>{const en=getEnabled();if(!en.length){stopPlay();return;}simStep();},600);}
function stopPlay(){S.playing=false;clearInterval(S.playTimer);document.getElementById('btn-play').textContent='⏵ Play';}

// ═══════════════════════════════════════════════════════════
// ANALYSIS
// ═══════════════════════════════════════════════════════════
function runAnalysis() {
  const btn=document.getElementById('analyse-btn');
  btn.classList.add('running'); btn.textContent='⊞ Running…';
  // Switch to analysis tab
  switchRightTab('analysis');
  setTimeout(()=>{
    const initM={};S.places.forEach(p=>{initM[p.id]=[...p.initTokens];});
    const ss=new StateSpace();
    const stats=ss.explore(initM,1000);
    S.stateSpace=ss;
    displayAnalysis(ss,stats);
    btn.classList.remove('running');btn.textContent='⊞ Analyse';
    log(`Analysis: ${stats.nodeCount} states, ${stats.edgeCount} arcs${stats.truncated?' (truncated)':''}`, 'system');
  },10);
}

function displayAnalysis(ss,stats) {
  document.getElementById('no-analysis').style.display='none';
  document.getElementById('analysis-results').style.display='';

  // Stats
  const scc=ss.sccCount();
  document.getElementById('ss-stats').innerHTML=`
    <div class="analysis-stat"><span class="analysis-key">States</span><span class="analysis-val">${stats.nodeCount}${stats.truncated?' <span style="color:var(--amber)">(cap)</span>':''}</span></div>
    <div class="analysis-stat"><span class="analysis-key">Arcs</span><span class="analysis-val">${stats.edgeCount}</span></div>
    <div class="analysis-stat"><span class="analysis-key">Dead markings</span><span class="analysis-val ${stats.deadlocks.length?'warn':'good'}">${stats.deadlocks.length}</span></div>
    <div class="analysis-stat"><span class="analysis-key">SCCs</span><span class="analysis-val">${scc}</span></div>
    <div class="analysis-stat"><span class="analysis-key">Analysis time</span><span class="analysis-val">${stats.timeMs}ms</span></div>
    <div class="analysis-stat"><span class="analysis-key">Strongly connected</span><span class="analysis-val ${scc===1?'good':'warn'}">${scc===1?'Yes':'No ('+scc+' SCCs)'}</span></div>
  `;

  // Boundedness
  const bounds=ss.boundedness();
  document.getElementById('ss-bounds').innerHTML=S.places.map(p=>{
    const max=bounds[p.id]||0;
    return`<div class="analysis-stat">
      <span class="analysis-key">${p.label}</span>
      <span><span class="analysis-badge badge-bounded">≤${max}</span></span>
    </div>`;
  }).join('');

  // Liveness
  const live=ss.liveness();
  document.getElementById('ss-live').innerHTML=S.transitions.map(t=>{
    const isLive=live[t.id];
    return`<div class="analysis-stat">
      <span class="analysis-key">${t.label}</span>
      <span class="analysis-badge ${isLive?'badge-live':'badge-dead'}">${isLive?'LIVE':'DEAD'}</span>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
// CANVAS RENDERING
// ═══════════════════════════════════════════════════════════
function svgEl(tag,attrs={}) {
  const e=document.createElementNS(SVG_NS,tag);
  for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);
  return e;
}
function svgTxt(tag,attrs,text) { const e=svgEl(tag,attrs); e.textContent=text; return e; }

function findNode(id) { return S.places.find(p=>p.id===id)||S.transitions.find(t=>t.id===id); }
function nodeKind(id) { return S.places.find(p=>p.id===id)?'place':S.transitions.find(t=>t.id===id)?'transition':null; }
function snapGrid(v) { return S.snap ? Math.round(v/GRID)*GRID : v; }

function getEdgePt(id, tx, ty) {
  const n=findNode(id);if(!n)return{x:0,y:0};
  const dx=tx-n.x,dy=ty-n.y,len=Math.sqrt(dx*dx+dy*dy)||1;
  const ux=dx/len,uy=dy/len;
  if(nodeKind(id)==='place')return{x:n.x+ux*PLACE_R,y:n.y+uy*PLACE_R};
  const hw=TW/2,hh=TH/2;
  const s=Math.min(hw/Math.abs(ux||.001),hh/Math.abs(uy||.001));
  return{x:n.x+ux*s,y:n.y+uy*s};
}

function render() {
  if(S.mode!=='visual') return;
  const enabled=getEnabled();
  const enTids=new Set(enabled.map(e=>e.t.id));
  const enPids=new Set();
  enabled.forEach(e=>{
    S.arcs.filter(a=>a.tgt===e.t.id).forEach(a=>enPids.add(a.src));
    S.arcs.filter(a=>a.src===e.t.id).forEach(a=>enPids.add(a.tgt));
  });

  renderArcs(enTids);
  renderNodes(enTids,enPids);
  updateEnabledPanel(enabled);
  updateMarkingPanel();
  updatePropsPanel();
  updateStatusBar();
}

function renderArcs(enTids) {
  const layer=document.getElementById('cv-arcs');
  layer.innerHTML='';

  // Build set of reverse arc pairs to decide straight vs curved
  const arcPairs=new Set(S.arcs.map(a=>a.src+'>'+a.tgt));
  const ARROW_OFFSET=10; // px beyond node surface for arrowhead

  S.arcs.forEach((arc,i)=>{
    const sn=findNode(arc.src), tn=findNode(arc.tgt);
    if(!sn||!tn)return;
    const isEn=enTids.has(arc.src)||enTids.has(arc.tgt);
    const hasReverse=arcPairs.has(arc.tgt+'>'+arc.src);

    // p1 = exit point on source surface, facing target
    // p2 = point on target surface facing source (arrowhead lands here)
    const p1=getEdgePt(arc.src, tn.x, tn.y);
    const p2=getEdgePt(arc.tgt, sn.x, sn.y);

    // Control point: curve if parallel arc exists, else gentle straight
    const CURVE=hasReverse?0.22:0.06;
    const dx=p2.x-p1.x, dy=p2.y-p1.y;
    const cx=(p1.x+p2.x)/2 - dy*CURVE;
    const cy=(p1.y+p2.y)/2 + dx*CURVE;

    // True midpoint on quadratic bezier at t=0.5
    const mx=0.25*p1.x+0.5*cx+0.25*p2.x;
    const my=0.25*p1.y+0.5*cy+0.25*p2.y;

    // SVG path with proper spaces
    const d=`M ${p1.x.toFixed(2)},${p1.y.toFixed(2)} Q ${cx.toFixed(2)},${cy.toFixed(2)} ${p2.x.toFixed(2)},${p2.y.toFixed(2)}`;

    const g=svgEl('g',{'data-arc':arc.id});
    if(isEn)g.appendChild(svgEl('path',{d,class:'arc-glow'}));
    g.appendChild(svgEl('path',{d,
      class:'arc-path'+(isEn?' en':''),
      'marker-end':isEn?'url(#arr-en)':'url(#arr)'
    }));

    // Label — wide enough for tuple expressions like "(j,w)"
    const expr=arc.expr;
    const lblW=Math.max(44, expr.length*7+16);
    const lbg=svgEl('rect',{
      x:mx-lblW/2, y:my-9, width:lblW, height:17, rx:3,
      class:'arc-lbl-bg',
      stroke:isEn?'#2563eb':'#0e2540','stroke-width':'0.8'
    });
    const lt=svgTxt('text',{
      x:mx, y:my+5, 'text-anchor':'middle',
      class:'arc-lbl-txt', fill:isEn?'#7dd3fc':'#2a5580'
    }, expr);
    g.appendChild(lbg); g.appendChild(lt);

    // Hit area for double-click edit
    const hit=svgEl('path',{d,stroke:'transparent','stroke-width':'14',fill:'none',style:'cursor:pointer'});
    hit.addEventListener('dblclick',ev=>{ev.stopPropagation();openArcModal(arc);});
    hit.addEventListener('contextmenu',ev=>{ev.preventDefault();ev.stopPropagation();});
    g.appendChild(hit);
    layer.appendChild(g);
  });
}

function renderNodes(enTids,enPids) {
  const layer=document.getElementById('cv-nodes');
  layer.innerHTML='';
  S.places.forEach(p=>layer.appendChild(buildPlace(p,enPids)));
  S.transitions.forEach(t=>layer.appendChild(buildTrans(t,enTids)));
}

function buildPlace(p,enPids) {
  const isSel=S.selected?.id===p.id;
  const isEn=enPids.has(p.id);
  const toks=p.tokens;
  const g=svgEl('g',{'data-id':p.id,transform:`translate(${p.x},${p.y})`});
  // Glow
  if(isEn)g.appendChild(svgEl('circle',{cx:0,cy:0,r:PLACE_R+14,fill:'#3b82f615',class:'place-outer'}));
  g.appendChild(svgEl('circle',{cx:0,cy:0,r:PLACE_R,class:'place-body'+(isSel?' sel':isEn?' en':'')}));
  g.appendChild(svgEl('circle',{cx:0,cy:0,r:PLACE_R-9,class:'place-ring'}));
  // Text
  g.appendChild(svgTxt('text',{x:0,y:toks.length>0?-12:-4,'text-anchor':'middle',class:'place-lbl'},p.label));
  g.appendChild(svgTxt('text',{x:0,y:5,'text-anchor':'middle',class:'place-cs'},`\u3008${p.colorSet||'?'}\u3009`));
  // Tokens
  if(!toks.length) {
    g.appendChild(svgTxt('text',{x:0,y:PLACE_R-10,'text-anchor':'middle',class:'empty-mark'},'∅'));
  } else {
    const show=toks.slice(0,4),extra=toks.length-show.length;
    show.forEach((tok,i)=>{
      const tx=(i-(show.length-1)/2)*17, ty=PLACE_R-14;
      const dg=svgEl('g');
      dg.appendChild(svgEl('circle',{cx:tx,cy:ty,r:7,class:'tok-dot'}));
      dg.appendChild(svgTxt('text',{x:tx,y:ty+3.5,'text-anchor':'middle',class:'tok-lbl'},tok.length>3?tok.slice(0,3):tok));
      const title=svgEl('title');title.textContent=tok;dg.appendChild(title);
      g.appendChild(dg);
    });
    if(extra>0)g.appendChild(svgTxt('text',{x:show.length*9+4,y:PLACE_R-10,'font-size':'8',fill:'#f59e0b'},`+${extra}`));
  }
  attachNodeEvents(g,'place',p.id);
  return g;
}

function buildTrans(t,enTids) {
  const isSel=S.selected?.id===t.id;
  const isEn=enTids.has(t.id);
  const g=svgEl('g',{'data-id':t.id,transform:`translate(${t.x},${t.y})`});
  if(isEn)g.appendChild(svgEl('rect',{x:-TW/2-8,y:-TH/2-8,width:TW+16,height:TH+16,rx:6,fill:'#16a34a15'}));
  g.appendChild(svgEl('rect',{x:-TW/2,y:-TH/2,width:TW,height:TH,rx:4,class:'trans-body'+(isSel?' sel':isEn?' en':'')}));
  g.appendChild(svgTxt('text',{x:0,y:t.guard&&t.guard!=='true'?-4:4,'text-anchor':'middle',class:'trans-lbl'},t.label));
  if(t.guard&&t.guard!=='true'){
    const gs=t.guard.length>18?t.guard.slice(0,16)+'…':t.guard;
    g.appendChild(svgTxt('text',{x:0,y:11,'text-anchor':'middle',class:'trans-guard'},`[${gs}]`));
  }
  attachNodeEvents(g,'transition',t.id);
  return g;
}

// ═══════════════════════════════════════════════════════════
// NODE INTERACTION
// ═══════════════════════════════════════════════════════════
let drag=null;

function attachNodeEvents(g,kind,id) {
  g.addEventListener('mousedown',ev=>{
    ev.stopPropagation();
    if(ev.button===2){openCtxMenu(ev,kind,id);return;}

    if(S.tool==='delete'){execCmd(Cmd.deleteNode(kind,id));return;}
    if(S.tool==='arc'){
      if(!S.arcSrc){S.arcSrc={kind,id};g.style.opacity='0.5';}
      else{
        if(S.arcSrc.id!==id){
          const cmd=Cmd.addArc(S.arcSrc.id,id,'x');
          execCmd(cmd);
          const arc=S.arcs[S.arcs.length-1];
          openArcModal(arc);
        }
        clearArcDraw();
      }
      return;
    }
    // Select + drag
    S.selected={type:kind,id};
    const node=findNode(id);
    drag={id,kind,ox:ev.clientX,oy:ev.clientY,nx:node.x,ny:node.y,moved:false};
    document.addEventListener('mousemove',onDragMove,{passive:true});
    document.addEventListener('mouseup',onDragEnd,{once:true});
    render();
  });
  g.addEventListener('dblclick',ev=>{
    ev.stopPropagation();
    if(kind==='transition'){
      const en=getEnabled();
      const item=en.find(e=>e.t.id===id);
      if(item){fireItem(item);return;}
    }
    S.selected={type:kind,id};render();
  });
  g.addEventListener('contextmenu',ev=>{ev.preventDefault();openCtxMenu(ev,kind,id);});
}

function svgPoint(ev) {
  const svg=document.getElementById('cpn-svg');
  const pt=svg.createSVGPoint();
  pt.x=ev.clientX;pt.y=ev.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}

function onDragMove(ev) {
  if(!drag)return;
  const node=findNode(drag.id);if(!node)return;
  const sp=svgPoint(ev);
  const rawX=drag.nx+(sp.x-svgPoint({clientX:drag.ox,clientY:drag.oy}).x);
  const rawY=drag.ny+(sp.y-svgPoint({clientX:drag.ox,clientY:drag.oy}).y);
  node.x=snapGrid(rawX);node.y=snapGrid(rawY);
  drag.moved=true;
  render();
}

function onDragEnd(ev) {
  if(drag&&drag.moved){
    const node=findNode(drag.id);
    // Push move to history
    const cmd=Cmd.moveNode(drag.id,drag.nx,drag.ny,node.x,node.y);
    // Don't re-execute (already done), just push to history
    S.history.splice(S.histIdx+1);
    S.history.push({do:()=>{node.x=node.x;node.y=node.y;},undo:()=>{node.x=drag.nx;node.y=drag.ny;}});
    S.histIdx=S.history.length-1;
  }
  drag=null;
  document.removeEventListener('mousemove',onDragMove);
}

// ═══════════════════════════════════════════════════════════
// PAN + ZOOM
// ═══════════════════════════════════════════════════════════
let panning=false,panStart={x:0,y:0},panOrigin={tx:0,ty:0};

function applyTransform() {
  document.getElementById('cv-root').setAttribute('transform',`translate(${S.tx},${S.ty}) scale(${S.scale})`);
  document.getElementById('sb-zoom').textContent=Math.round(S.scale*100)+'%';
}

function zoomAt(cx,cy,factor) {
  const newScale=Math.min(4,Math.max(0.15,S.scale*factor));
  const f=newScale/S.scale;
  S.tx=cx-(cx-S.tx)*f;
  S.ty=cy-(cy-S.ty)*f;
  S.scale=newScale;
  applyTransform();
}

function fitToScreen() {
  if(!S.places.length&&!S.transitions.length)return;
  const all=[...S.places,...S.transitions];
  const W=document.getElementById('canvas-wrap').clientWidth;
  const H=document.getElementById('canvas-wrap').clientHeight;
  const pad=80;
  const minX=Math.min(...all.map(n=>n.x))-PLACE_R;
  const maxX=Math.max(...all.map(n=>n.x))+PLACE_R;
  const minY=Math.min(...all.map(n=>n.y))-PLACE_R;
  const maxY=Math.max(...all.map(n=>n.y))+PLACE_R;
  const scaleX=(W-pad*2)/(maxX-minX||1);
  const scaleY=(H-pad*2)/(maxY-minY||1);
  S.scale=Math.min(1.5,Math.min(scaleX,scaleY));
  S.tx=W/2-((minX+maxX)/2)*S.scale;
  S.ty=H/2-((minY+maxY)/2)*S.scale;
  applyTransform();
}

const cvWrap=document.getElementById('canvas-wrap');
cvWrap.addEventListener('wheel',ev=>{
  ev.preventDefault();
  const rect=cvWrap.getBoundingClientRect();
  const cx=ev.clientX-rect.left,cy=ev.clientY-rect.top;
  zoomAt(cx,cy,ev.deltaY<0?1.1:0.91);
},{passive:false});

cvWrap.addEventListener('mousedown',ev=>{
  if(ev.button===1||(ev.button===0&&ev.altKey)){
    panning=true;panStart={x:ev.clientX,y:ev.clientY};panOrigin={tx:S.tx,ty:S.ty};
    document.getElementById('cpn-svg').classList.add('panning');
    ev.preventDefault();
  }
});
document.addEventListener('mousemove',ev=>{
  if(!panning)return;
  S.tx=panOrigin.tx+(ev.clientX-panStart.x);
  S.ty=panOrigin.ty+(ev.clientY-panStart.y);
  applyTransform();
});
document.addEventListener('mouseup',ev=>{
  if(panning){panning=false;document.getElementById('cpn-svg').classList.remove('panning');}
});

// Canvas click
document.getElementById('cpn-svg').addEventListener('click',ev=>{
  if(drag?.moved)return;
  const sp=svgPoint(ev);
  const x=snapGrid((sp.x-0)/1), y=snapGrid((sp.y-0)/1);
  if(S.tool==='place'){execCmd(Cmd.addPlace(x,y));return;}
  if(S.tool==='transition'){execCmd(Cmd.addTransition(x,y));return;}
  if(S.tool==='arc'){clearArcDraw();return;}
  S.selected=null;render();
});

// Mouse move for arc preview + cursor coords
document.getElementById('cpn-svg').addEventListener('mousemove',ev=>{
  const sp=svgPoint(ev);
  document.getElementById('sb-cursor').textContent=`x:${Math.round(sp.x)} y:${Math.round(sp.y)}`;
  if(!S.arcSrc)return;
  const prev=document.getElementById('cv-preview');

  prev.appendChild(svgEl('path',{d:d2,class:'arc-preview','marker-end':'url(#arr-pr)'}));
});

function updatePropsPanel() {
  if(!S.selected){
    document.getElementById('props-form').style.display='none';
    document.getElementById('no-sel').style.display='';return;
  }
  document.getElementById('props-form').style.display='';
  document.getElementById('no-sel').style.display='none';
  const node=findNode(S.selected.id);if(!node)return;
  const isP=S.selected.type==='place';
  document.getElementById('p-name').value=node.label;
  document.getElementById('pg-cs').style.display=isP?'':'none';
  document.getElementById('pg-init').style.display=isP?'':'none';
  document.getElementById('pg-toks').style.display=isP?'':'none';
  document.getElementById('pg-guard').style.display=isP?'none':'';
  if(isP){
    document.getElementById('p-cs').value=node.colorSet||'';
    document.getElementById('p-init').value=(node.initTokens||[]).join(', ');
    document.getElementById('p-toks').textContent=node.tokens.length?node.tokens.join(', '):'∅';
  } else {
    document.getElementById('p-guard').value=node.guard||'true';
  }
}

document.getElementById('p-name').addEventListener('change',ev=>{

// ═══════════════════════════════════════════════════════════
// TEXT EDITOR — SYNTAX HIGHLIGHTING
// ═══════════════════════════════════════════════════════════
function hlLine(line) {
  if(!line.trim())return'<br>';
  const e=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  if(line.trim().startsWith('//')||line.trim().startsWith('#'))return`<span class="hl-cm">${e(line)}</span>`;
  let m;
  m=line.match(/^(\s*)(colorset)(\s+)(\w+)(\s*=\s*)(\{)([^}]*)(\})(.*)/);
  if(m){const toks=m[7].split(',').map(t=>`<span class="hl-tk">${e(t.trim())}</span>`).join('<span class="hl-pt">, </span>');return`${e(m[1])}<span class="hl-kw">${m[2]}</span>${e(m[3])}<span class="hl-nm">${m[4]}</span><span class="hl-pt">${e(m[5])}{</span>${toks}<span class="hl-pt">}</span>${e(m[9])}`;}
  m=line.match(/^(\s*)(place)(\s+)(\w+)(\s*:\s*)([\w*×]+)(\s*=\s*)(\{)([^}]*)(\})(.*)/);
  if(m){const toks=m[9].split(',').map(t=>`<span class="hl-tk">${e(t.trim())}</span>`).join('<span class="hl-pt">, </span>');return`${e(m[1])}<span class="hl-kw">${m[2]}</span>${e(m[3])}<span class="hl-nm">${m[4]}</span><span class="hl-pt">:</span><span class="hl-cs">${m[6]}</span><span class="hl-pt">${e(m[7])}{</span>${toks}<span class="hl-pt">}</span>${e(m[11])}`;}
  m=line.match(/^(\s*)(transition)(\s+)(\w+)(\s*)(\[guard:\s*)?([^\]]*)?(\])?/);
  if(m){let o=`${e(m[1])}<span class="hl-kw">${m[2]}</span>${e(m[3])}<span class="hl-nm">${m[4]}</span>`;if(m[6])o+=`<span class="hl-pt">${e(m[5]+m[6])}</span><span class="hl-gd">${e(m[7]||'')}</span><span class="hl-pt">${m[8]||'}'}</span>`;return o;}
  m=line.match(/^(\s*)(arc)(\s+)(\w+)(\s*-->\s*)(\w+)(\s*:\s*)(.*)/);
  if(m)return`${e(m[1])}<span class="hl-kw">${m[2]}</span>${e(m[3])}<span class="hl-nm">${m[4]}</span><span class="hl-pt">${e(m[5])}</span><span class="hl-nm">${m[6]}</span><span class="hl-pt">${e(m[7])}</span><span class="hl-ex">${e(m[8])}</span>`;
  return e(line);
}
function updateHL() {
  const val=document.getElementById('cpn-editor').value;
  const lines=val.split('\n');
  document.getElementById('hl-overlay').innerHTML=lines.map(l=>`<div>${hlLine(l)}</div>`).join('');
  document.getElementById('line-nums').innerHTML=lines.map((_,i)=>`<div>${i+1}</div>`).join('');
}

  if(ev.key==='Tab'){ev.preventDefault();const s=ed.selectionStart,e2=ed.selectionEnd;ed.value=ed.value.slice(0,s)+'  '+ed.value.slice(e2);ed.selectionStart=ed.selectionEnd=s+2;updateHL();}
  if(ev.key==='Enter'&&ev.ctrlKey)applyText();

let applyTimer=null;
function debounceApply(){clearTimeout(applyTimer);applyTimer=setTimeout(applyText,700);}
function applyText() {
  const src=ed.value;

  const dot=document.getElementById('dot'),dotTxt=document.getElementById('dot-txt'),errBar=document.getElementById('err-bar');
  if(res.errors.length){errBar.textContent=res.errors.join(' | ');errBar.style.display='';dot.classList.add('err');dotTxt.textContent=`${res.errors.length} error(s)`;return;}

  S.arcs=res.arcs.map((a,i)=>({id:'arc'+i,src:byLabel[a.src]?.id||a.src,tgt:byLabel[a.tgt]?.id||a.tgt,expr:a.expr})).filter(a=>a.src&&a.tgt);

// ── TEST FRAMEWORK ────────────────────────────────────────────
class Runner {
  constructor() { this.suites=[]; this.results={pass:0,fail:0,total:0}; }
  suite(name,fn){ this.suites.push({name,fn,tests:[]}); }
  async runAll(){
    const t0=performance.now();
    this.results={pass:0,fail:0,total:0};
    for(const s of this.suites){
      s.tests=[];
      const t=(name,fn)=>s.tests.push({name,fn,status:'pending'});
      s.fn(t);
    }
    this.results.total=this.suites.reduce((n,s)=>n+s.tests.length,0);
    let done=0;
    for(const s of this.suites){
      const st0=performance.now();
      for(const test of s.tests){
        const tt0=performance.now();
        try{await test.fn();test.status='pass';test.time=performance.now()-tt0;this.results.pass++;}
        catch(e){test.status='fail';test.error=e.message;test.time=performance.now()-tt0;this.results.fail++;}
        done++;
        document.getElementById('pb').style.width=(done/this.results.total*100)+'%';
      }
      s.time=performance.now()-st0;
      renderSuite(s);
    }
    const el=performance.now()-t0;
    document.getElementById('sp').textContent=this.results.pass;
    document.getElementById('sf').textContent=this.results.fail;
    document.getElementById('st').textContent=this.results.total;
    document.getElementById('stm').textContent=el.toFixed(0)+'ms';
    document.getElementById('pb').style.background=this.results.fail===0?'#16a34a':'#dc2626';
  }
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderSuite(s){
  const pass=s.tests.filter(t=>t.status==='pass').length;
  const fail=s.tests.filter(t=>t.status==='fail').length;
  const bid='sb-'+s.name.replace(/\W/g,'_');
  const div=document.createElement('div');div.className='suite';
  div.innerHTML=`<div class="sh" onclick="tog('${bid}')">
    <span class="sn">${esc(s.name)}</span>
    <span class="st">${s.time.toFixed(0)}ms</span>
    <span class="sb ${fail>0?'no':'ok'}">${fail>0?fail+' FAILED':pass+'/'+s.tests.length+' PASS'}</span>
  </div>
  <div class="tbody ${fail>0?'open':''}" id="${bid}">
    ${s.tests.map(t=>`<div class="tr">
      <span class="ti ${t.status==='pass'?'tp':'tf'}">${t.status==='pass'?'✓':'✗'}</span>
      <div style="flex:1"><div class="tn">${esc(t.name)}</div>${t.error?`<div class="te">${esc(t.error)}</div>`:''}</div>
      <span class="tt">${t.time.toFixed(1)}ms</span>
    </div>`).join('')}
  </div>`;
  document.getElementById('suites').appendChild(div);
}

function assert(c,m){if(!c)throw new Error(m||'Failed');}
function eq(a,b,m){if(a!==b)throw new Error((m||'')+'\n  expected: '+JSON.stringify(b)+'\n  got:      '+JSON.stringify(a));}
function deepEq(a,b,m){if(JSON.stringify(a)!==JSON.stringify(b))throw new Error((m||'')+'\n  expected: '+JSON.stringify(b)+'\n  got:      '+JSON.stringify(a));}
function approx(a,b,tol,m){if(Math.abs(a-b)>tol)throw new Error((m||'')+' expected ≈'+b+'±'+tol+' got:'+a);}

function resetS(){S.places=[];S.transitions=[];S.arcs=[];S.colorsets={};S.history=[];S.histIdx=-1;S.selected=null;S.snap=true;S.simStep=0;}
function setupPC(){
  S.places=[
    {id:'Ready',tokens:['j1','j2','j3'],initTokens:['j1','j2','j3']},
    {id:'Idle', tokens:['w1','w2'],initTokens:['w1','w2']},
    {id:'Busy', tokens:[],initTokens:[]},
    {id:'Done', tokens:[],initTokens:[]},
  ];
  S.transitions=[{id:'Assign',label:'Assign'},{id:'Complete',label:'Complete'}];
  S.arcs=[{src:'Ready',tgt:'Assign',expr:'j'},{src:'Idle',tgt:'Assign',expr:'w'},
    {src:'Assign',tgt:'Busy',expr:'(j,w)'},{src:'Busy',tgt:'Complete',expr:'(j,w)'},
    {src:'Complete',tgt:'Done',expr:'j'},{src:'Complete',tgt:'Idle',expr:'w'}];
  S.simStep=0;const m={};S.places.forEach(p=>{m[p.id]=[...p.initTokens];});return m;
}

R.suite('10. Tuple Token Parsing — paren-aware split',t=>{
  t('tuple in initial marking parses correctly',()=>{
    const r=T.parseCPN('colorset S={s1}\ncolorset R={get_index}\nplace P:S*R={(s1,get_index)}');
    assert(r.errors.length===0,'parse error: '+r.errors);
    eq(r.places[0].initTokens.length,1,'should have 1 token');
    eq(r.places[0].initTokens[0],'(s1,get_index)','token should be the full tuple');
  });
  t('multiple tuples in initial marking',()=>{
    const r=T.parseCPN('colorset S={s1,s2}\ncolorset R={a,b}\nplace P:S*R={(s1,a),(s2,b)}');
    eq(r.places[0].initTokens.length,2,'should have 2 tokens');
    eq(r.places[0].initTokens[0],'(s1,a)');
    eq(r.places[0].initTokens[1],'(s2,b)');
  });
  t('mixed simple and tuple tokens in same list',()=>{
    // colorset values (in colorset decl) should still split simply
    const r=T.parseCPN('colorset S={a,b,c}');
    assert(r.cs.S.includes('a')&&r.cs.S.includes('b')&&r.cs.S.includes('c'));
  });
  t('tuple token firing: arc consumes correct tuple',()=>{
    resetS();
    const r=T.parseCPN(
      'colorset SESSION={s1}\ncolorset REQUEST={get_index}\n'+
      'place Ready:SESSION={s1}\n'+
      'place Pending:SESSION*REQUEST={(s1,get_index)}\n'+
      'place Channel:SESSION*REQUEST={}\n'+

      'arc Ready-->Send:s\narc Pending-->Send:(s,r)\narc Send-->Channel:(s,r)'

  t('HTTPS CPN parses cleanly: 3 colorsets, 26 places, 13 transitions, 49 arcs',()=>{
    resetS();
    const httpsSrc=`colorset SESSION={s1,s2,s3}
colorset REQUEST={get_index,get_api,post_data}
colorset RESPONSE={r200,r404,r500}
place ClientIdle:SESSION={s1,s2,s3}
place ClientTCP:SESSION={}
place ClientHelloSent:SESSION={}
place ClientVerifying:SESSION={}
place ClientReady:SESSION={}
place ClientWaiting:SESSION={}
place ResponseReceived:SESSION={}
place ClientDone:SESSION={}
place ClientError:SESSION={}
place TCPChannel:SESSION={}
place ClientHelloMsg:SESSION={}
place ServerHelloMsg:SESSION={}
